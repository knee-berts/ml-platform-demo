apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: training-job-1
  namespace: training-jobs
  labels:
    kueue.x-k8s.io/queue-name: training-queue
    kueue.x-k8s.io/priority-class: training-low
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    restartPolicy: Default
    leaderTemplate:
      metadata:
        labels:
          role: leader
      spec:
        nodeSelector:
          cloud.google.com/gke-accelerator: nvidia-rtx-pro-6000
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        containers:
          - name: training-sim
            image: nvidia/cuda:12.6.3-base-ubuntu24.04
            command: ["bash", "-c"]
            args:
              - |
                echo "=== Training Job 1 Leader Started ==="
                nvidia-smi
                echo "Simulating distributed training..."
                sleep infinity
            resources:
              requests:
                nvidia.com/gpu: "1"
              limits:
                nvidia.com/gpu: "1"
    workerTemplate:
      spec:
        nodeSelector:
          cloud.google.com/gke-accelerator: nvidia-rtx-pro-6000
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        containers:
          - name: training-sim
            image: nvidia/cuda:12.6.3-base-ubuntu24.04
            command: ["bash", "-c"]
            args:
              - |
                echo "=== Training Job 1 Worker Started ==="
                nvidia-smi
                echo "Simulating distributed training worker..."
                sleep infinity
            resources:
              requests:
                nvidia.com/gpu: "1"
              limits:
                nvidia.com/gpu: "1"
---

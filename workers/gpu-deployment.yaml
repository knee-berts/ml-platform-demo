apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama3-8b-instruct
  namespace: inference-server
  labels:
    kueue.x-k8s.io/queue-name: inference-queue
    kueue.x-k8s.io/priority-class: inference-high
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-llama3-8b-instruct
  template:
    metadata:
      labels:
        app: vllm-llama3-8b-instruct
        kueue.x-k8s.io/queue-name: inference-queue
        kueue.x-k8s.io/priority-class: inference-high
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-rtx-pro-6000

      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

      # Prevents a 'vllm' Service in the namespace from injecting VLLM_PORT
      # as tcp://<IP>:<PORT>, which crashes vLLM (expects a numeric value).
      enableServiceLinks: false

      # preStop sleep(30s) + worst-case drain ~55s + 50% buffer = ~130s
      terminationGracePeriodSeconds: 130

      initContainers:
        - name: lora-adapter-syncer
          image: registry.k8s.io/gateway-api-inference-extension/lora-syncer:v1.1.0-rc.1
          imagePullPolicy: IfNotPresent
          restartPolicy: Always   # sidecar semantic (Kubernetes 1.29+)
          tty: true
          stdin: true
          env:
            - name: DYNAMIC_LORA_ROLLOUT_CONFIG
              value: "/config/configmap.yaml"
          volumeMounts:
            # DO NOT use subPath — dynamic ConfigMap updates don't propagate on subPaths
            - name: config-volume
              mountPath: /config
            - name: data
              mountPath: /data

      containers:
        - name: vllm
          image: "us-east1-docker.pkg.dev/kubecon-fleets-demo-1/vllm-blackwell/vllm-blackwell:latest"
          imagePullPolicy: IfNotPresent
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "gs://kubecon-fleets-demo-1-model-weights/meta-llama/Llama-3.1-8B-Instruct/"
            - "--load-format"
            - "runai_streamer"
            - "--model-loader-extra-config"
            - '{"distributed":true}'
            - "--tensor-parallel-size"
            - "1"
            - "--port"
            - "8000"
            - "--max-num-seq"
            - "1024"
            - "--enable-lora"
            - "--max-loras"
            - "16"
            - "--max-lora-rank"
            - "64"
            - "--max-cpu-loras"
            - "32"
          env:
            # Force vLLM v1 engine — required for prefix caching and because
            # enabling LoRA disables v1 auto-detection in older builds.
            - name: VLLM_USE_V1
              value: "1"
            # Use FlashInfer backend — fastest on Blackwell (sm_120).
            - name: VLLM_ATTENTION_BACKEND
              value: "FLASHINFER"
            # Expandable segments reduce fragmentation on 96 GB VRAM.
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
            - name: PORT
              value: "8000"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            # Allow hot-swapping LoRA adapters without restarting the server.
            - name: VLLM_ALLOW_RUNTIME_LORA_UPDATING
              value: "true"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          lifecycle:
            preStop:
              # vLLM stops accepting new connections on SIGTERM. Sleep lets the
              # upstream gateway (Envoy) drain us from rotation before the pod exits.
              sleep:
                seconds: 30
          startupProbe:
            httpGet:
              path: /health
              port: http
            # 10 minutes max for model download + GPU load; increase if needed.
            failureThreshold: 600
            initialDelaySeconds: 2
            periodSeconds: 1
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 1
            failureThreshold: 5
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 1
            failureThreshold: 1
            timeoutSeconds: 1
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: shm
              mountPath: /dev/shm

      volumes:
        - name: data
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
        - name: config-volume
          configMap:
            name: vllm-llama3-8b-instruct-adapters

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-llama3-8b-instruct-adapters
  namespace: inference-server
data:
  configmap.yaml: |
    vLLMLoRAConfig:
      name: vllm-llama3-8b-instruct-adapters
      port: 8000
      defaultBaseModel: meta-llama/Llama-3.1-8B-Instruct
      ensureExist:
        models:
        - id: food-review-1
          source: Kawon/llama3.1-food-finetune_v14_r8

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-llama3-8b-instruct
  namespace: inference-server
spec:
  selector:
    app: vllm-llama3-8b-instruct
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  type: ClusterIP

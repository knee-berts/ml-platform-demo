apiVersion: v1
kind: ServiceAccount
metadata:
  name: least-disruption-dispatcher
  namespace: kueue-system

---
# ClusterRole for reading Kueue resources and patching Workload status
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: least-disruption-dispatcher
rules:
  # Watch and read Workloads across namespaces
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloads"]
    verbs: ["get", "list", "watch"]
  # Patch Workload status (to set nominatedClusterNames)
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloads/status"]
    verbs: ["patch", "update"]
  # Read MultiKueue configuration
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["multikueueclusters", "multikueueconfigs", "clusterqueues"]
    verbs: ["get", "list", "watch"]
  # Read Secrets (for worker cluster kubeconfigs)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Read ConfigMaps (for scorer config)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: least-disruption-dispatcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: least-disruption-dispatcher
subjects:
  - kind: ServiceAccount
    name: least-disruption-dispatcher
    namespace: kueue-system
